      <use href="#o"/><use href="#o" transform="rotate(30)"/><use href="#o" transform="rotate(60)"/>
      <use href="#o" transform="rotate(90)"/><use href="#o" transform="rotate(120)"/><use href="#o" transform="rotate(150)"/>
